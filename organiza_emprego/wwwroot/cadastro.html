<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-container">
        <div class="auth-card">
            <h2>Criar Conta</h2>
            <form id="form-cadastro">
                <div class="form-group">
                    <label for="cad-nome">Nome Completo</label>
                    <input type="text" id="cad-nome" required placeholder="Ex: Filipe Menezes">
                </div>
                <div class="form-group">
                    <label for="cad-email">E-mail</label>
                    <input type="email" id="cad-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="cad-senha">Senha</label>
                    <input type="password" id="cad-senha" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="btn-primary">Registrar</button>
            </form>
            <!-- Mudança aqui: Link direto para voltar ao login.html -->
            <p class="auth-switch">Já possui conta? <a href="login.html">Voltar para o Login</a></p>
        </div>
    </section>

    <script>
        const API_URL = "http://localhost:5000/api";

        document.getElementById("form-cadastro").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                nome: document.getElementById("cad-nome").value,
                email: document.getElementById("cad-email").value,
                senha: document.getElementById("cad-senha").value
            };

            try {
                const response = await fetch(`${API_URL}/Auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Cadastro realizado com sucesso!");
                    window.location.href = "login.html"; // Vai para o login
                } else {
                    const erroTxt = await response.text();
                    alert(`Erro: ${erroTxt}`);
                }
            } catch (error) {
                alert("Erro ao conectar à API.");
            }
        });
    </script>
</body>
</html>
