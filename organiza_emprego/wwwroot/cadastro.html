<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-container">
        <div class="auth-card">

            <div class="header-container">
                <img src="img/titulo.png" alt="Remember Apply" class="titulo-imagem">
            </div>

            <form id="form-cadastro">

                <h2>Criar Conta</h2>


                <div class="form-group">
                    <label for="cad-nome">Nome Completo</label>
                    <input type="text" id="cad-nome" required placeholder="Ex: Filipe Menezes">
                </div>
                <div class="form-group">
                    <label for="cad-email">E-mail</label>
                    <input type="email" id="cad-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="cad-senha">Senha</label>
                    <input type="password" id="cad-senha" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="btn-primary">Registrar</button>
            </form>
            <!-- Mudança aqui: Link direto para voltar ao login.html -->
            <p class="auth-switch">Já possui conta? <a href="login.html">Voltar para o Login</a></p>
        </div>
    </section>

    <script src="js/cadastro.js"></script> 
</body>
</html>
