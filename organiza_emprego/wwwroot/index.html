<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Minhas Vagas</title>
    <!-- Importação da fonte Inter para dar o visual moderno de SaaS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <main id="view-dashboard">
        <!-- Cabeçalho Principal -->
        <header class="main-header">

            <div class="header-container">
                <img src="img/titulo.png" alt="Remember Apply" class="titulo-imagem">
            </div>




            <div class="user-menu">
                <span id="user-greeting">Olá, Usuário</span>
                <button id="btn-logout" class="btn-danger">Sair / Logout</button>
            </div>
        </header>

        <!-- Grid de Conteúdo Superior: Formulário e Gráficos lado a lado -->
        <div class="dashboard-grid">

            <!-- Formulário de Cadastro -->
            <section class="dashboard-card form-vaga-card">
                <h3>Nova Candidatura</h3>
                <form id="form-vaga">
                    <div class="form-group">
                        <label>Empresa</label>
                        <input type="text" id="vaga-empresa" class="filter-input" required>
                    </div>
                    <div class="form-group">
                        <label>Vaga</label>
                        <input type="text" id="vaga-nome" class="filter-input" required>
                    </div>
                    <div class="form-group">
                        <label>Link da Vaga</label>
                        <input type="url" id="vaga-link" class="filter-input">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="vaga-status" class="filter-input">
                            <option value="Aplicado">Aplicado</option>
                            <option value="Entrevista">Entrevista</option>
                            <option value="Teste Técnico">Teste Técnico</option>
                            <option value="Aprovado">Aprovado</option>
                            <option value="Recusado">Recusado</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-success">Salvar Candidatura</button>
                </form>
            </section>

            <!-- 📈 Gráfico de Rosca -->
            <section class="dashboard-card chart-card">
                <h3>Distribuição por Status</h3>
                <div style="position: relative; height: 240px; width: 100%;">
                    <canvas id="chartStatusRosca"></canvas>
                </div>
            </section>

            <!-- 📈 Gráfico de Barras -->
            <section class="dashboard-card chart-card">
                <h3>Volume do Processo Seletivo</h3>
                <div style="position: relative; height: 240px; width: 100%;">
                    <canvas id="chartStatusBarras"></canvas>
                </div>
            </section>

        </div>

        <!-- 🔍 Seção de Filtros e Busca (Estilos movidos com sucesso para o CSS) -->
        <section class="dashboard-card pesquisa_vagas">
            <div class="filter-group">
                <div class="field-wrapper">
                    <label for="search-empresa">Empresa</label>
                    <input type="text" id="search-empresa" class="filter-input" placeholder="Buscar por empresa...">
                </div>

                <div class="field-wrapper">
                    <label for="search-vaga">Vaga</label>
                    <input type="text" id="search-vaga" class="filter-input" placeholder="Buscar por vaga...">
                </div>

                <div class="field-wrapper">
                    <label for="search-data">Data da Aplicação</label>
                    <input type="date" id="search-data" class="filter-input">
                </div>

                <div class="button-group">
                    <button onclick="carregarCandidaturas()" class="btn-primary">Filtrar</button>
                    <button onclick="limparFiltros()" class="btn-secondary">Limpar</button>
                </div>
            </div>
        </section>

        <!-- Tabela de Candidaturas -->
        <section class="dashboard-card lista-vagas-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
                <h3 style="margin: 0;">Minhas Candidaturas</h3>

                <!-- 📊 Contador de Candidaturas Dinâmico -->
                <div class="vagas-contador-container" style="font-size: 0.95rem; color: var(--text-muted);">
                    <span>Total exibido: <strong id="total-candidaturas" style="background-color: var(--primary); color: white; padding: 0.25rem 0.6rem; border-radius: 9999px; font-size: 0.85rem;">0</strong></span>
                </div>
            </div>

            <!-- Container que aplica as bordas arredondadas e sombras na tabela -->
            <div class="table-container">
                <table class="modern-table">
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Vaga</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="vagas-table-body"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
