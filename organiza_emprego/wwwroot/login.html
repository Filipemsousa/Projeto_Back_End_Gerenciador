<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Painel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-container">
        <div class="auth-card">
            <h2>Acessar Painel</h2>
            <form id="form-login">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <!-- Mudança aqui: Link direto para o outro arquivo HTML -->
            <p class="auth-switch">Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </div>
    </section>

    <script>
        const API_URL = "http://localhost:5000/api";

        // Se o usuário já tiver um token válido, manda ele direto para o index
        if (localStorage.getItem("token")) {
            window.location.href = "index.html";
        }

        document.getElementById("form-login").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById("login-email").value,
                senha: document.getElementById("login-senha").value
            };

            try {
                const response = await fetch(`${API_URL}/Auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const dados = await response.json();
                    localStorage.setItem("token", dados.token);
                    localStorage.setItem("usuario_nome", dados.nome || "Candidato");

                    // Mudança aqui: Redireciona o navegador para a página principal
                    window.location.href = "index.html";
                } else {
                    alert("E-mail ou senha incorretos.");
                }
            } catch (error) {
                alert("Falha na autenticação.");
            }
        });
    </script>

</body>
</html>
