<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Painel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-container">
        <div class="auth-card">

            <div class="header-container">
                <img src="img/titulo.png" alt="Remember Apply" class="titulo-imagem">
            </div>
            
            <form id="form-login">
                <h2>Bem vindo!</h2>
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <!-- Mudança aqui: Link direto para o outro arquivo HTML -->
            <p class="auth-switch">Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </div>
    </section>

    <script src="js/login.js"></script>

</body>
</html>
